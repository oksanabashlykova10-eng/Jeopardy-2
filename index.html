        function sfxWinEpic() { beep({freq: 392, type: "square", dur: 0.15, vol: 0.15}); beep({freq: 523, type: "square", dur: 0.15, vol: 0.15, when: 0.15}); beep({freq: 659, type: "square", dur: 0.15, vol: 0.15, when: 0.30}); beep({freq: 783, type: "square", dur: 0.60, vol: 0.15, when: 0.45}); }
        function sfxWinArcade() { [261, 329, 392, 523, 659, 783, 1046].forEach((f, i) => { beep({freq: f, type: "square", dur: 0.1, vol: 0.1, when: i * 0.1}); }); beep({freq: 1046, type: "square", dur: 0.5, vol: 0.1, when: 0.7}); }
        function sfxWinBell() { beep({freq: 440, type: "sine", dur: 0.2, vol: 0.1}); beep({freq: 554, type: "sine", dur: 0.2, vol: 0.1, when: 0.2}); beep({freq: 659, type: "sine", dur: 0.2, vol: 0.1, when: 0.4}); beep({freq: 880, type: "sine", dur: 1.0, vol: 0.1, slide: 0.9, when: 0.6}); }
        function playWinSound() { if (gameConfig.winSoundStyle === 'arcade') sfxWinArcade(); else if (gameConfig.winSoundStyle === 'bell') sfxWinBell(); else sfxWinEpic(); }

        function launchFireworks(mode, singleColor) {
            if (!gameConfig.fireworksEnabled || mode === 'none') return;
            const container = document.getElementById('play-mode') || document.body;
            const canvas = document.createElement('canvas');
            canvas.style.position = 'fixed'; canvas.style.top = '0'; canvas.style.left = '0'; canvas.style.width = '100%'; canvas.style.height = '100%';
            canvas.style.zIndex = '9999'; canvas.style.pointerEvents = 'none';
            container.appendChild(canvas);
            
            const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let particles = []; const multiColors = ['#FFD700', '#FFA500', '#00FFFF', '#FF0000', '#00FF00']; 
            
            function createBurst(x, y) {
                sfxFirework();
                const count = 100;
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2; const speed = Math.random() * 5 + 2;
                    const color = mode === 'multi' ? multiColors[Math.floor(Math.random() * multiColors.length)] : singleColor;
                    particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, alpha: 1, color: color, decay: Math.random() * 0.015 + 0.015 });
                }
            }

            let burstsFired = 0; const totalBursts = 7;
            function scheduleNextBurst() {
                if (burstsFired >= totalBursts) return;
                const x = Math.random() * (canvas.width * 0.8) + (canvas.width * 0.1); const y = Math.random() * (canvas.height * 0.5) + (canvas.height * 0.1);
                createBurst(x, y); burstsFired++;
                if (burstsFired < totalBursts) setTimeout(scheduleNextBurst, Math.random() * 300 + 200);
            }
            scheduleNextBurst();
            
            let animationId;
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height); let alive = false;
                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i]; if (p.alpha <= 0) continue;
                    alive = true; p.vy += 0.05; p.x += p.vx; p.y += p.vy; p.alpha -= p.decay;
                    ctx.globalAlpha = Math.max(0, p.alpha); ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill();
                }
                if (!alive && burstsFired >= totalBursts) { cancelAnimationFrame(animationId); if (canvas.parentNode) canvas.parentNode.removeChild(canvas); } 
                else { animationId = requestAnimationFrame(animate); }
            }
            animate();
        }

        function playSound(type) { 
            if (audioPlayers[type]) { 
                audioPlayers[type].currentTime = 0;
                audioPlayers[type].play().catch(e => console.log("Audio block:", e)); 
            } 
        }

        function startGame() {
            try { audioCtx().resume(); } catch(e) {}
            gameConfig.teams = parseInt(document.getElementById('team-count').value);
            scores = Array(gameConfig.teams).fill(0); currentTeamIndex = 0; questionsAnswered = 0;
            
            audioPlayers['click'] = new Audio(gameConfig.sounds.click);
            audioPlayers['correct'] = new Audio(gameConfig.sounds.correct);
            audioPlayers['wrong'] = new Audio(gameConfig.sounds.wrong);
            for(let key in audioPlayers) { audioPlayers[key].load(); }

            document.getElementById('start-screen').style.display = 'none'; document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('in-game-controls').style.display = 'flex'; buildBoard(); buildTeams();
        }

        function buildBoard() {
            const board = document.getElementById('jeopardy-board'); if(!board) return; board.innerHTML = '';
            gameConfig.categories.forEach((cat, colIndex) => {
                const catEl = document.createElement('div'); catEl.className = 'category-cell'; catEl.innerText = cat; catEl.style.setProperty('--col-color', gameConfig.colColors[colIndex]); board.appendChild(catEl);
            });
            for (let row = 0; row < 5; row++) {
                for (let col = 0; col < 5; col++) {
                    const cell = document.createElement('div'); cell.className = 'question-cell'; cell.innerText = gameConfig.points[row];
                    const hex = gameConfig.colColors[col]; cell.style.setProperty('--col-color', hex); cell.style.setProperty('--col-color-transparent', hex + '33');
                    cell.onclick = function() {
                        if (this.classList.contains('disabled')) return;
                        try { audioCtx().resume(); } catch(e) {}
                        playSound('click'); activeCell = this; currentPoints = parseInt(gameConfig.points[row]);
                        openRealModal(gameConfig.categories[col], currentPoints, hex, col, row);
                    };
                    board.appendChild(cell);
                }
            }
        }

        function buildTeams() {
            const panel = document.getElementById('teams-panel'); if(!panel) return; panel.innerHTML = '';
            for (let i = 0; i < gameConfig.teams; i++) {
                const teamCard = document.createElement('div'); teamCard.className = 'team-card'; if(i === currentTeamIndex) teamCard.classList.add('active');
                teamCard.id = `team-card-${i}`;
                teamCard.innerHTML = `<div class="team-avatar">${(!gameConfig.avatars[i].startsWith('http') && !gameConfig.avatars[i].startsWith('data:')) ? `<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:1.5rem;">${gameConfig.avatars[i]}</div>` : `<img src="${gameConfig.avatars[i]}" style="width:100%;height:100%;object-fit:cover;">`}</div><div class="team-info"><span class="team-score" id="score-${i}">${scores[i]}</span></div>`;
                panel.appendChild(teamCard);
            }
        }

        function openRealModal(category, points, colorHex, col, row) {
            currentActiveCol = col; currentActiveRow = row;
            document.getElementById('modal-header-text').innerText = `${category} - ${points}`;
            document.getElementById('modal-content-box').style.setProperty('--col-color', colorHex);
            const area = document.getElementById('modal-interactive-area'); const taskText = document.getElementById('modal-task-text');
            area.innerHTML = ''; document.getElementById('result-overlay').style.opacity = '0';
            
            let n = document.querySelector('.btn-next-arrow'); if(n) n.remove();
            const q = gameConfig.questions[col][row]; taskText.innerText = q.text;

            if(q.hasMedia && q.mediaUrl.trim() !== '') {
                const mediaCont = document.createElement('div'); mediaCont.className = 'media-container';
                if(q.mediaType === 'image') mediaCont.innerHTML = `<img src="${q.mediaUrl}">`; else if(q.mediaType === 'audio') mediaCont.innerHTML = `<audio controls src="${q.mediaUrl}" autoplay></audio>`;
                area.appendChild(mediaCont);
            }

            if(q.type === 'choice') { 
                const wrap = document.createElement('div'); wrap.className = 'choice-container';
                let validOptions = q.options.filter(o => o && o.trim() !== ''); validOptions.sort(() => Math.random() - 0.5);
                validOptions.forEach(opt => {
                    const btn = document.createElement('button'); btn.className = 'btn-choice'; btn.innerText = opt;
                    btn.onclick = () => answerLogic(opt === q.correctAnswer, btn); wrap.appendChild(btn);
                });
                area.appendChild(wrap);
            } else if(q.type === 'input') { 
                area.innerHTML += `<input type="text" id="active-input-ans" class="input-field" placeholder="Type answer..."><br>`;
                const btn = document.createElement('button'); btn.className = 'btn-submit'; btn.innerText = 'CHECK';
                btn.onclick = () => {
                    let possibleAnswers = q.correctAnswer.split(',').map(s => s.trim().toLowerCase());
                    let userAns = document.getElementById('active-input-ans').value.trim().toLowerCase();
                    answerLogic(possibleAnswers.includes(userAns), null);
                }
                area.appendChild(btn);
            } else if(q.type === 'unscramble') { 
                const ansLine = document.createElement('div'); ansLine.className = 'answer-line'; const pool = document.createElement('div'); pool.className = 'word-pool';
                let words = q.correctAnswer.split(' ').filter(w => w.trim() !== ''); words.sort(() => Math.random() - 0.5);
                words.forEach(w => {
                    const chip = document.createElement('div'); chip.className = 'word-chip'; chip.innerText = w;
                    chip.onclick = function() { if(this.parentElement === pool) ansLine.appendChild(this); else pool.appendChild(this); };
                    pool.appendChild(chip);
                });
                const btn = document.createElement('button'); btn.className = 'btn-submit'; btn.innerText = 'CHECK';
                btn.onclick = () => answerLogic(Array.from(ansLine.children).map(c => c.innerText).join(' ') === q.correctAnswer, null);
                area.appendChild(ansLine); area.appendChild(pool); area.appendChild(btn);
            }
            document.getElementById('question-modal').style.display = 'flex';
        }

        function answerLogic(isCorrect, el) {
            document.getElementById('modal-interactive-area').style.pointerEvents = 'none';
            const overlay = document.getElementById('result-overlay'); overlay.style.opacity = '1';
            let q = gameConfig.questions[currentActiveCol][currentActiveRow];
            
            try { audioCtx().resume(); } catch(e) {}

            if(isCorrect) {
                playSound('correct'); overlay.style.background = 'var(--correct-color)'; overlay.innerHTML = '✓'; overlay.style.color = '#000';
                if(el) { el.style.borderColor = 'var(--correct-color)'; el.style.boxShadow = '0 0 15px var(--correct-color)'; el.style.background = 'rgba(0,255,0,0.2)';}
                scores[currentTeamIndex] += currentPoints; document.getElementById(`score-${currentTeamIndex}`).innerText = scores[currentTeamIndex];
            } else {
                playSound('wrong'); overlay.style.background = 'var(--wrong-color)'; overlay.innerHTML = '✗'; overlay.style.color = '#fff';
                if(el) { el.style.borderColor = 'var(--wrong-color)'; el.style.boxShadow = '0 0 15px var(--wrong-color)'; el.style.background = 'rgba(255,0,0,0.2)';}
                
                if (q.type === 'choice') {
                    document.querySelectorAll('.btn-choice').forEach(b => {
                        if(b.innerText === q.correctAnswer) { b.style.borderColor = 'var(--correct-color)'; b.style.boxShadow = '0 0 20px var(--correct-color)'; b.style.background = 'rgba(0,255,0,0.3)'; }
                    });
                } else if (q.type === 'input') {
                    let inp = document.getElementById('active-input-ans'); inp.value = q.correctAnswer.split(',')[0]; 
                    inp.style.borderColor = 'var(--correct-color)'; inp.style.color = 'var(--correct-color)'; inp.style.boxShadow = '0 0 15px var(--correct-color)';
                } else if (q.type === 'unscramble') {
                    let ansLine = document.querySelector('.answer-line'); ansLine.innerHTML = '';
                    let pool = document.querySelector('.word-pool'); pool.innerHTML = '';
                    q.correctAnswer.split(' ').forEach(w => {
                        if(w.trim()) {
                            let chip = document.createElement('div'); chip.className = 'word-chip'; chip.innerText = w;
                            chip.style.background = 'var(--correct-color)'; chip.style.color = '#000'; chip.style.boxShadow = '0 0 15px var(--correct-color)';
                            ansLine.appendChild(chip);
                        }
                    });
                }
            }
            let nextBtn = document.createElement('button'); nextBtn.className = 'btn-next-arrow'; nextBtn.innerHTML = 'CONTINUE ➔'; nextBtn.onclick = closeQuestionModal;
            document.getElementById('modal-content-box').appendChild(nextBtn);
        }

        function closeQuestionModal() {
            let n = document.querySelector('.btn-next-arrow'); if(n) n.remove();
            document.getElementById('question-modal').style.display = 'none'; document.getElementById('modal-interactive-area').style.pointerEvents = 'auto';
            if (activeCell) { activeCell.innerText = ""; activeCell.classList.add('disabled'); activeCell = null; }
            
            questionsAnswered++; 
            if (questionsAnswered >= totalQuestions) {
                forceEndGame();
            } else { 
                nextTurn(); 
            }
        }

        function nextTurn() {
            document.getElementById(`team-card-${currentTeamIndex}`).classList.remove('active');
            currentTeamIndex = (currentTeamIndex + 1) % gameConfig.teams;
            document.getElementById(`team-card-${currentTeamIndex}`).classList.add('active');
        }

        function forceEndGame() {
            try { audioCtx().resume(); } catch(e) {} 
            
            playWinSound();
            
            document.getElementById('game-screen').style.display = 'none'; 
            document.getElementById('question-modal').style.display = 'none';
            document.getElementById('start-screen').style.display = 'none'; 
            document.getElementById('in-game-controls').style.display = 'none';
            
            document.getElementById('final-screen').style.display = 'flex';
            
            launchFireworks(gameConfig.fireworkMode, gameConfig.fireworkColor);

            let results = [];
            for (let i = 0; i < gameConfig.teams; i++) { results.push({ id: i, name: `Team ${i + 1}`, score: scores[i], avatar: (!gameConfig.avatars[i].startsWith('http') && !gameConfig.avatars[i].startsWith('data:')) ? `<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:1.5rem;">${gameConfig.avatars[i]}</div>` : `<img src="${gameConfig.avatars[i]}" style="width:100%;height:100%;object-fit:cover;">` }); }
            results.sort((a, b) => b.score - a.score);

            const titleEl = document.getElementById('f-title-text');
            const subEl = document.getElementById('f-sub-text');
            
            if (results[0].score === 0) { 
                titleEl.innerText = "GAME OVER"; 
                subEl.innerText = "No points scored."; 
            } else { 
                titleEl.innerText = gameConfig.ui.finTitle.replace('{team}', results[0].name); 
                subEl.innerText = gameConfig.ui.finSub; 
            }

            const lbContainer = document.getElementById('leaderboard'); lbContainer.innerHTML = '';
            results.forEach((team, index) => { lbContainer.innerHTML += `<div class="leaderboard-row"><div>#${index + 1}</div><div style="display:flex; align-items:center; gap:10px;"><div style="width:30px; height:30px; border-radius:50%; overflow:hidden;">${team.avatar}</div> ${team.name}</div><div style="color:var(--points-color); font-weight:bold;">${team.score}</div></div>`; });
        }

        // Защита
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
        document.addEventListener('keydown', function(e) {
            if(e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || (e.ctrlKey && e.key === 'u')) { e.preventDefault(); return false; }
        });
    </script>
</body>
